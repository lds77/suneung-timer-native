<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Medium.ttf'); font-weight: 500; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1290px; height: 100vh; overflow: hidden; }
  body {
    font-family: 'P', sans-serif;
    background: linear-gradient(175deg, #EFEAFB 0%, #F7F5FC 45%, #E7E0F8 100%);
    display: flex; flex-direction: column; align-items: center; position: relative;
  }
  .brand { margin-top: 150px; background: #FFFFFF; color: #6C4DC4; font-size: 40px; font-weight: 700;
    padding: 16px 44px; border-radius: 999px; box-shadow: 0 6px 24px rgba(108,77,196,0.18); }
  h1 { margin-top: 90px; font-size: 128px; line-height: 1.22; letter-spacing: -3px;
    color: #241A47; text-align: center; font-weight: 700; }
  h1 .accent { color: #6C4DC4; }
  .sub { margin-top: 52px; font-size: 52px; font-weight: 500; color: #5B5477; text-align: center; line-height: 1.5; }

  .card {
    width: 1010px; background: #fff; border-radius: 52px; padding: 60px 64px;
    box-shadow: 0 30px 90px rgba(60,40,130,0.18); margin-bottom: 40px;
  }
  .card:last-child { margin-bottom: 0; }
  .card .name { display: flex; align-items: center; gap: 18px; font-size: 48px; font-weight: 700; color: #241A47; margin-bottom: 36px; }
  .card .ic { width: 64px; height: 64px; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
  .card .ic svg { width: 36px; height: 36px; }
  .chips { display: flex; flex-wrap: wrap; gap: 20px; }
  .chip {
    border-radius: 999px; padding: 20px 34px; font-size: 38px; font-weight: 700;
    background: #F5F3FB; color: #5B5477; border: 3px solid transparent; white-space: nowrap;
  }
  .chip.sel { background: #F3EEFF; color: #6C4DC4; border-color: #6C4DC4; }
  .card .d { margin-top: 30px; font-size: 37px; font-weight: 500; color: #8A82A6; line-height: 1.5; }
  .card .d b { color: #6C4DC4; font-weight: 700; }
  .schip { border-radius: 999px; padding: 20px 34px; font-size: 38px; font-weight: 700; white-space: nowrap;
    display: flex; align-items: center; gap: 14px; }
  .schip .dot { width: 18px; height: 18px; border-radius: 9px; }
  .foot { position: absolute; bottom: 130px; left: 0; right: 0; text-align: center;
    font-size: 46px; font-weight: 700; color: #6C4DC4; }
</style>
</head>
<body>
  <div class="brand">열공메이트</div>
  <h1>초등부터 공시생까지,<br><span class="accent">나에게 맞게</span></h1>
  <div class="sub">내 단계를 고르면 앱이 알아서 맞춰드려요</div>
<div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%; padding-bottom:140px;">

  <div class="card">
    <div class="name"><span class="ic" style="background:#F3EEFF"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4L3 8.5 12 13l9-4.5L12 4z" stroke="#6C4DC4" stroke-width="1.8" stroke-linejoin="round"/><path d="M6.5 10.8V15c0 1.4 2.5 2.8 5.5 2.8s5.5-1.4 5.5-2.8v-4.2" stroke="#6C4DC4" stroke-width="1.8"/><path d="M21 9v5" stroke="#6C4DC4" stroke-width="1.8" stroke-linecap="round"/></svg></span>내 단계 선택</div>
    <div class="chips">
      <span class="chip">초등 저학년</span>
      <span class="chip">초등 고학년</span>
      <span class="chip">중학생</span>
      <span class="chip sel">고등학생</span>
      <span class="chip">N수생</span>
      <span class="chip">대학생</span>
      <span class="chip">공시생 · 자격증</span>
    </div>
    <div class="d">집중밀도 채점 기준과 <b>추천 공부법</b>이 내 단계에 맞게 바뀌어요</div>
  </div>

  <div class="card">
    <div class="name"><span class="ic" style="background:#EAF6EE"><svg viewBox="0 0 24 24" fill="none"><path d="M4 10v4h3l5 4V6l-5 4H4z" stroke="#3E9C5F" stroke-width="1.8" stroke-linejoin="round"/><path d="M16 9.5a4 4 0 0 1 0 5" stroke="#3E9C5F" stroke-width="1.8" stroke-linecap="round"/><path d="M18.5 7a8 8 0 0 1 0 10" stroke="#3E9C5F" stroke-width="1.8" stroke-linecap="round"/></svg></span>집중을 돕는 백색소음 10종</div>
    <div class="chips">
      <span class="schip" style="background:#EAF2FC;color:#4A90D9"><span class="dot" style="background:#4A90D9"></span>빗소리</span>
      <span class="schip" style="background:#FDF4E7;color:#C98A2D"><span class="dot" style="background:#E8A33D"></span>카페</span>
      <span class="schip" style="background:#F5F3FB;color:#5B5477"><span class="dot" style="background:#8E9AAF"></span>도서관</span>
      <span class="schip" style="background:#FDECEC;color:#E17055"><span class="dot" style="background:#E17055"></span>모닥불</span>
      <span class="schip" style="background:#E9F5F8;color:#3D8FA8"><span class="dot" style="background:#3D8FA8"></span>파도</span>
      <span class="schip" style="background:#EAF6EE;color:#3E9C5F"><span class="dot" style="background:#3E9C5F"></span>숲속</span>
      <span class="schip" style="background:#F3EEFF;color:#6C4DC4"><span class="dot" style="background:#6C4DC4"></span>연필 소리</span>
    </div>
    <div class="d">공부하는 동안 잔잔하게 · 여러 개 섞어 재생도 가능</div>
  </div>
</div>

  <div class="foot">이 모든 게 전부 무료, 광고 없음</div>
</body>
</html>
