<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Medium.ttf'); font-weight: 500; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1290px; height: 100vh; overflow: hidden; }
  body {
    font-family: 'P', sans-serif;
    background: linear-gradient(175deg, #EFEAFB 0%, #F7F5FC 45%, #E7E0F8 100%);
    display: flex; flex-direction: column; align-items: center; position: relative;
  }
  .brand { margin-top: 150px; background: #FFFFFF; color: #6C4DC4; font-size: 40px; font-weight: 700;
    padding: 16px 44px; border-radius: 999px; box-shadow: 0 6px 24px rgba(108,77,196,0.18); }
  h1 { margin-top: 90px; font-size: 128px; line-height: 1.22; letter-spacing: -3px;
    color: #241A47; text-align: center; font-weight: 700; }
  h1 .accent { color: #6C4DC4; }
  .sub { margin-top: 52px; font-size: 52px; font-weight: 500; color: #5B5477; text-align: center; line-height: 1.5; }
  .stage { position: relative; width: 1290px; flex: 1; }
  .phone { position: absolute; border-radius: 100px; background: #14112B; padding: 20px;
    box-shadow: 0 50px 140px rgba(40,25,100,0.38); }
  .screen { border-radius: 80px; overflow: hidden; background: #000; }
  /* 뒤: 아날로그 시계 (다크) */
  .p-clock { right: 100px; top: 60px; transform: rotate(5deg); }
  .p-clock .screen { width: 620px; height: 1180px; }
  .p-clock img { width: 100%; display: block; margin-top: -60px; }
  /* 앞: 수능 시간표 */
  .p-seq { left: 110px; top: 330px; transform: rotate(-4deg); }
  .p-seq .screen { width: 720px; height: 1330px; }
  .p-seq img { width: 100%; display: block; margin-top: -115px; }
  .badge {
    position: absolute; right: 150px; top: 1330px;
    background: #2D4E8F; color: #fff; font-size: 42px; font-weight: 700;
    padding: 20px 46px; border-radius: 999px; box-shadow: 0 14px 40px rgba(45,78,143,0.4);
    transform: rotate(3deg);
  }
  @media (max-height: 2590px) { html, body { height: 2580px; } .brand { margin-top: 80px; } h1 { margin-top: 56px; } }
</style>
</head>
<body>
  <div class="brand">열공메이트</div>
  <h1>실제 수능 시간표<br><span class="accent">그대로 연습</span></h1>
  <div class="sub">쉬는 시간까지, 시험장 그 시계까지 그대로</div>
  <div class="stage">
    <div class="phone p-clock"><div class="screen"><img src="file:///C:/suneung-timer-native/screenshots/cap-analog-dark.png"></div></div>
    <div class="phone p-seq"><div class="screen"><img src="file:///C:/suneung-timer-native/screenshots/cap-sequence.png"></div></div>
    <div class="badge">쉬는시간 자동 진행</div>
  </div>
</body>
</html>
