<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Medium.ttf'); font-weight: 500; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 2160px; overflow: hidden; }
  body { font-family: 'P', sans-serif; background: linear-gradient(175deg, #EFEAFB 0%, #F7F5FC 45%, #E7E0F8 100%);
    display: flex; flex-direction: column; align-items: center; position: relative; }
  .brand { margin-top: 60px; background: #FFFFFF; color: #6C4DC4; font-size: 34px; font-weight: 700;
    padding: 14px 38px; border-radius: 999px; box-shadow: 0 5px 20px rgba(108,77,196,0.18); }
  h1 { margin-top: 38px; font-size: 100px; line-height: 1.2; letter-spacing: -2px; color: #241A47; text-align: center; font-weight: 700; }
  h1 .accent { color: #6C4DC4; }
  .sub { margin-top: 30px; font-size: 42px; font-weight: 500; color: #5B5477; text-align: center; line-height: 1.5; }
  .badge { margin-top: 30px; background: #ED5E86; color: #fff; font-size: 34px; font-weight: 700;
    padding: 15px 40px; border-radius: 999px; box-shadow: 0 12px 34px rgba(237,94,134,0.35); }
  .phone { margin-top: 150px; width: 812px; border-radius: 84px; background: #14112B; padding: 18px; box-shadow: 0 40px 120px rgba(40,25,100,0.34); }
  .screen { border-radius: 66px; overflow: hidden; width: 776px; height: 1271px; background: #6a4a8a; }
  .screen img { width: 100%; display: block; }
</style>
</head>
<body>
  <div class="brand">열공메이트</div>
  <h1>앱을 열지 않아도<br><span class="accent">공부 중</span></h1>
  <div class="sub">홈 화면 · 잠금화면 위젯 5종, 위젯에서 바로 시작</div>
  <div class="badge">홈/잠금화면 위젯</div>
  <div class="phone"><div class="screen"><img src="file:///C:/suneung-timer-native/screenshots/ios_widgets_home5.jpg"></div></div>
</body>
</html>
