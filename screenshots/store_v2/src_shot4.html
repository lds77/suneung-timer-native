<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Medium.ttf'); font-weight: 500; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1290px; height: 2796px; overflow: hidden; }
  body {
    font-family: 'P', sans-serif;
    background: linear-gradient(175deg, #EFEAFB 0%, #F7F5FC 45%, #E7E0F8 100%);
    display: flex; flex-direction: column; align-items: center; position: relative;
  }
  .brand { margin-top: 130px; background: #FFFFFF; color: #6C4DC4; font-size: 40px; font-weight: 700;
    padding: 16px 44px; border-radius: 999px; box-shadow: 0 6px 24px rgba(108,77,196,0.18); }
  h1 { margin-top: 80px; font-size: 122px; line-height: 1.22; letter-spacing: -3px;
    color: #241A47; text-align: center; font-weight: 700; }
  h1 .accent { color: #6C4DC4; }
  .sub { margin-top: 48px; font-size: 50px; font-weight: 500; color: #5B5477; text-align: center; line-height: 1.5; }
  .stage { position: relative; width: 1290px; flex: 1; }
  .phone { position: absolute; border-radius: 100px; background: #14112B; padding: 20px;
    box-shadow: 0 50px 140px rgba(40,25,100,0.38); }
  .screen { border-radius: 80px; overflow: hidden; background: #14112B; }
  /* 뒤: 다크모드 주간 시간표 (컬러풀) */
  .p-dark { right: 95px; top: 50px; transform: rotate(5deg); }
  .p-dark .screen { width: 600px; height: 1170px; }
  .p-dark img { width: 100%; display: block; }
  /* 앞: 라이트 주간 시간표 */
  .p-week { left: 105px; top: 300px; transform: rotate(-4deg); }
  .p-week .screen { width: 748px; height: 1522px; background: #fff; }
  .p-week img { width: 100%; display: block; }
  .badge {
    position: absolute; right: 150px; top: 1360px;
    background: #3E9C5F; color: #fff; font-size: 42px; font-weight: 700;
    padding: 20px 46px; border-radius: 999px; box-shadow: 0 14px 40px rgba(62,156,95,0.4);
    transform: rotate(3deg); z-index: 2;
  }
</style>
</head>
<body>
  <div class="brand">열공메이트</div>
  <h1>계획 세우기 말고,<br><span class="accent">지키기</span></h1>
  <div class="sub">타이머로 공부하면 시간표에 실행이 자동으로 쌓여요</div>
  <div class="stage">
    <div class="phone p-dark"><div class="screen"><img src="file:///C:/suneung-timer-native/screenshots/cap-planner-dark.png"></div></div>
    <div class="phone p-week"><div class="screen"><img src="file:///C:/suneung-timer-native/screenshots/cap-planner-week2.png"></div></div>
    <div class="badge">계획 vs 실행</div>
  </div>
</body>
</html>
