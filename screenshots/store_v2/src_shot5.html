<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Medium.ttf'); font-weight: 500; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1290px; height: 100vh; overflow: hidden; }
  body {
    font-family: 'P', sans-serif;
    background: linear-gradient(175deg, #EFEAFB 0%, #F7F5FC 45%, #E7E0F8 100%);
    display: flex; flex-direction: column; align-items: center; position: relative;
  }
  .brand { margin-top: 150px; background: #FFFFFF; color: #6C4DC4; font-size: 40px; font-weight: 700;
    padding: 16px 44px; border-radius: 999px; box-shadow: 0 6px 24px rgba(108,77,196,0.18); }
  h1 { margin-top: 90px; font-size: 128px; line-height: 1.22; letter-spacing: -3px;
    color: #241A47; text-align: center; font-weight: 700; }
  h1 .accent { color: #6C4DC4; }
  .sub { margin-top: 52px; font-size: 52px; font-weight: 500; color: #5B5477; text-align: center; line-height: 1.5; }

  .ddays { margin-top: 140px; display: flex; gap: 36px; }
  .dcard {
    width: 460px; background: #fff; border-radius: 56px; padding: 64px 70px;
    box-shadow: 0 30px 90px rgba(60,40,130,0.18);
  }
  .dcard .name { font-size: 46px; font-weight: 700; color: #5B5477; }
  .dcard .dnum { margin-top: 22px; font-size: 102px; font-weight: 700; letter-spacing: -3px; color: #2D4E8F; white-space: nowrap; }
  .dcard.hot .dnum { color: #E17055; }
  .dcard .note { margin-top: 18px; font-size: 38px; font-weight: 500; color: #8A82A6; }

  .plan {
    margin-top: 56px; width: 956px; background: #fff; border-radius: 56px;
    padding: 70px 74px 78px; box-shadow: 0 30px 90px rgba(60,40,130,0.18);
  }
  .plan .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
  .plan .title { font-size: 52px; font-weight: 700; color: #241A47; }
  .plan .pct { font-size: 44px; font-weight: 700; color: #6C4DC4; }
  .row {
    display: flex; align-items: center; gap: 30px;
    padding: 38px 40px; border-radius: 36px; background: #F8F6FD; margin-bottom: 24px;
  }
  .row:last-child { margin-bottom: 0; }
  .dot { width: 22px; height: 22px; border-radius: 11px; }
  .row .nm { flex: 1; font-size: 46px; font-weight: 700; color: #241A47; }
  .row .min { font-size: 42px; font-weight: 500; color: #8A82A6; margin-right: 8px; }
  .play {
    width: 88px; height: 88px; border-radius: 28px; display: flex; align-items: center; justify-content: center;
  }
  .play svg { width: 36px; height: 36px; }
  .done-row { opacity: 0.55; }
  .done-row .nm { text-decoration: line-through; }
  .foot { position: absolute; bottom: 130px; left: 0; right: 0; text-align: center;
    font-size: 44px; font-weight: 500; color: #6C4DC4; }
  @media (max-height: 2590px) {
    html, body { height: 2580px; }
    .brand { margin-top: 80px; } h1 { margin-top: 56px; }
    .ddays { margin-top: 90px; } .foot { bottom: 80px; }
  }
</style>
</head>
<body>
  <div class="brand">열공메이트</div>
  <h1>수능까지,<br><span class="accent">오늘 할 만큼만</span></h1>
  <div class="sub">시험일을 등록하면 매일 자동 카운트 · 오늘 계획을 바로 시작</div>
<div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%; padding-bottom:140px;">

  <div class="ddays">
    <div class="dcard hot">
      <div class="name">수능 2026</div>
      <div class="dnum">D-124</div>
      <div class="note">2026년 11월 19일</div>
    </div>
    <div class="dcard">
      <div class="name">기말고사</div>
      <div class="dnum">D-30</div>
      <div class="note">준비 할 일 4개</div>
    </div>
  </div>

  <div class="plan">
    <div class="head">
      <div class="title">오늘의 계획</div>
      <div class="pct">달성 33%</div>
    </div>
    <div class="row done-row">
      <div class="dot" style="background:#E17055"></div>
      <div class="nm">국어 기출</div><div class="min">80분</div>
      <div class="play" style="background:#EDEAF6">
        <svg viewBox="0 0 24 24" fill="none"><path d="M7 12.5l3.2 3.2L17.5 8" stroke="#8A82A6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    <div class="row">
      <div class="dot" style="background:#4A90D9"></div>
      <div class="nm">수학 오답노트</div><div class="min">50분</div>
      <div class="play" style="background:#4A90D9">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M8.5 6.2v11.6c0 .9 1 1.5 1.8 1L19 13c.8-.5.8-1.6 0-2.1L10.3 5.2c-.8-.5-1.8.1-1.8 1z"/></svg>
      </div>
    </div>
    <div class="row">
      <div class="dot" style="background:#3E9C5F"></div>
      <div class="nm">영어 단어 100개</div><div class="min">30분</div>
      <div class="play" style="background:#3E9C5F">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M8.5 6.2v11.6c0 .9 1 1.5 1.8 1L19 13c.8-.5.8-1.6 0-2.1L10.3 5.2c-.8-.5-1.8.1-1.8 1z"/></svg>
      </div>
    </div>
  </div>
</div>

  <div class="foot">계획 블록을 누르면 그 시간만큼 타이머가 시작돼요</div>
</body>
</html>
