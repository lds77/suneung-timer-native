<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'P'; src: url('file:///C:/suneung-timer-native/assets/fonts/Pretendard-Medium.ttf'); font-weight: 500; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1290px; height: 100vh; overflow: hidden; }
  body {
    font-family: 'P', sans-serif;
    background: linear-gradient(175deg, #EFEAFB 0%, #F7F5FC 45%, #E7E0F8 100%);
    display: flex; flex-direction: column; align-items: center; position: relative;
  }
  .brand { margin-top: 150px; background: #FFFFFF; color: #6C4DC4; font-size: 40px; font-weight: 700;
    padding: 16px 44px; border-radius: 999px; box-shadow: 0 6px 24px rgba(108,77,196,0.18); }
  h1 { margin-top: 90px; font-size: 128px; line-height: 1.22; letter-spacing: -3px;
    color: #241A47; text-align: center; font-weight: 700; }
  h1 .accent { color: #6C4DC4; }
  .sub { margin-top: 52px; font-size: 52px; font-weight: 500; color: #5B5477; text-align: center; line-height: 1.5; }

  .grid { margin-top: 140px; width: 1010px; display: flex; flex-direction: column; gap: 40px; }
  .rowx { display: flex; gap: 40px; }
  .widget {
    background: rgba(255,255,255,0.92); border-radius: 52px; padding: 56px 60px;
    box-shadow: 0 30px 90px rgba(60,40,130,0.2); flex: 1;
  }
  .widget .k { font-size: 38px; font-weight: 700; color: #5B5477; display: flex; justify-content: space-between; align-items: center; }
  .widget .k .pct { color: #6C4DC4; }
  .w-study .v { margin-top: 30px; font-size: 86px; font-weight: 700; letter-spacing: -2px; color: #241A47; white-space: nowrap; }
  .bar { margin-top: 30px; height: 16px; border-radius: 8px; background: #EDEAF6; overflow: hidden; }
  .bar i { display: block; height: 100%; width: 78%; background: #6C4DC4; border-radius: 8px; }
  .w-study .n { margin-top: 24px; font-size: 34px; font-weight: 500; color: #8A82A6; }
  .w-dday .v { margin-top: 30px; font-size: 116px; font-weight: 700; letter-spacing: -2px; color: #2D4E8F; }
  .w-dday .n { margin-top: 24px; font-size: 40px; font-weight: 700; color: #5B5477; }
  .chips { margin-top: 36px; display: flex; flex-wrap: wrap; gap: 22px; }
  .chip {
    display: flex; align-items: center; gap: 16px;
    border-radius: 999px; padding: 24px 40px; font-size: 40px; font-weight: 700; color: #241A47;
  }
  .chip .d { width: 20px; height: 20px; border-radius: 10px; }
  .chip .h { font-weight: 700; color: #5B5477; margin-left: 6px; }
  .foot { position: absolute; bottom: 130px; left: 0; right: 0; text-align: center;
    font-size: 44px; font-weight: 500; color: #6C4DC4; }
  @media (max-height: 2590px) {
    html, body { height: 2580px; }
    .brand { margin-top: 80px; } h1 { margin-top: 56px; }
    .grid { margin-top: 90px; } .foot { bottom: 80px; }
  }
</style>
</head>
<body>
  <div class="brand">열공메이트</div>
  <h1>앱을 열지 않아도<br><span class="accent">공부 중</span></h1>
  <div class="sub">홈 화면 · 잠금화면 위젯 5종, 위젯에서 바로 시작까지</div>
<div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%; padding-bottom:140px;">

  <div class="grid">
    <div class="rowx">
      <div class="widget w-study">
        <div class="k">오늘 공부 <span class="pct">목표 141%</span></div>
        <div class="v">8h 28m</div>
        <div class="bar"><i></i></div>
        <div class="n">3일 연속 달성 중</div>
      </div>
      <div class="widget w-dday">
        <div class="k">시험 D-Day</div>
        <div class="v">D-124</div>
        <div class="n">수능 2026</div>
      </div>
    </div>
    <div class="widget">
      <div class="k">과목 바로 시작 <span style="color:#8A82A6; font-weight:500;">이번 주 공부량</span></div>
      <div class="chips">
        <div class="chip" style="background:#FDECEC"><span class="d" style="background:#E17055"></span>국어<span class="h">4h 10m</span></div>
        <div class="chip" style="background:#EAF2FC"><span class="d" style="background:#4A90D9"></span>수학<span class="h">6h 30m</span></div>
        <div class="chip" style="background:#EAF6EE"><span class="d" style="background:#3E9C5F"></span>영어<span class="h">3h 45m</span></div>
        <div class="chip" style="background:#FDF4E7"><span class="d" style="background:#E8A33D"></span>탐구<span class="h">2h 20m</span></div>
      </div>
    </div>
  </div>
</div>

  <div class="foot">과목을 누르면 홈 화면에서 타이머가 바로 시작돼요</div>
</body>
</html>
